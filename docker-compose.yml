services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: codeforge
      POSTGRES_PASSWORD: codeforge_dev_pass
      POSTGRES_DB: codeforge_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://codeforge:codeforge_dev_pass@db:5432/codeforge_db

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
